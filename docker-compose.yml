volumes:
  etc_wireguard:

services:
  wg-easy:
    image: ghcr.io/platon47/wg-easy-ip-tls:latest
    container_name: wg-easy
    environment:
      - PORT=51821
      - HOST=0.0.0.0
      - INSECURE=false
      - DISABLE_IPV6=true
      - LEGO_ENABLED=true
      - LEGO_RENEW_INTERVAL=86400
      - NODE_OPTIONS=--no-deprecation
      # AUTO mode — uncomment and set these to have lego obtain certs automatically:
      # - LEGO_EMAIL=your@email.com
      # - LEGO_IP=1.2.3.4
      # - LEGO_CHALLENGE=http    # http (requires port 80) or tls-alpn (requires port 443)
      # MANUAL mode (default) — mount pre-provisioned certs at /root/cert/ip (see volumes below)
    networks:
      wg:
        ipv4_address: 10.42.42.42
    volumes:
      - etc_wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
      - /root/cert/ip:/root/cert/ip:ro
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    # Prevent privilege escalation inside the container
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

networks:
  wg:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24
          gateway: 10.42.42.1
